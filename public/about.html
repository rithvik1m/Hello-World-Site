<!DOCTYPE html>
<html>
<head>
    <title>About Me</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <h2>Rithvik1M</h2>
    <div>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="goals.html">Goals</a>
    </div>
</nav>

<section class="slide-in-left">
    <h1>About Me</h1>
    <p>I build websites, apps, and compete in photography competitions.</p>
</section>

<section class="card slide-in-right">
    <h2>Classes I’m Taking (Sophomore Year)</h2>
    <ul>
        <li>AP Language</li>
        <li>AP Biology</li>
        <li>AP World History</li>
        <li>Precalculus</li>
        <li>Intro to Business</li>
        <li>Photography</li>
    </ul>
</section>

<script>
const slideElements = document.querySelectorAll('.slide-in-left, .slide-in-right');

const elementInView = (el, offset = 0) => {
    const elementTop = el.getBoundingClientRect().top;
    return elementTop <= (window.innerHeight || document.documentElement.clientHeight) - offset;
};

const displaySlideElement = (el) => el.classList.add('slide-in-visible');

const handleScrollAnimation = () => {
    slideElements.forEach((el) => {
        if (elementInView(el, 100)) displaySlideElement(el);
    });
};

window.addEventListener('scroll', handleScrollAnimation);
window.addEventListener('scroll', () => {
    document.querySelector('nav').classList.toggle('scrolled', window.scrollY > 50);
});
</script>

</body>
</html>
